<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Game Companion — 杂鱼酱</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ====== Login Screen ====== -->
  <div class="login-screen" id="login-screen">
    <div class="login-frame">
      <!-- Left dark panel -->
      <div class="login-panel">
        <!-- Logo icon -->
        <img src="image/a2b7cecbe8f8698b401d12c33eb41788ae4faa21.png" alt="Logo" class="login-logo">
        <!-- Title -->
        <img src="image/5373b9e400111e98e0bc6c79c52b37af9fa1753f.png" alt="AI Game Companion" class="login-title">

        <!-- Account input -->
        <div class="login-input-group" id="group-account">
          <div class="login-input-bg"></div>
          <input type="text" class="login-input" id="input-account" placeholder="请输入账号" autocomplete="off">
        </div>

        <!-- Password input -->
        <div class="login-input-group" id="group-password">
          <div class="login-input-bg"></div>
          <input type="password" class="login-input" id="input-password" placeholder="请输入密码" autocomplete="off">
        </div>

        <!-- Login button -->
        <button class="login-btn" id="btn-login">
          <span>登录</span>
        </button>

        <!-- Register button -->
        <button class="register-btn" id="btn-register">
          <span>注册</span>
        </button>
      </div>
    </div>
  </div>

  <div class="app-container">

    <!-- ====== Top Navigation Bar (shared across all tabs) ====== -->
    <header class="top-nav">
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="首页">
          <span>首页</span>
        </button>
        <button class="nav-tab" data-tab="伙伴">
          <span>伙伴</span>
        </button>
        <button class="nav-tab" data-tab="游戏">
          <span>游戏</span>
        </button>
        <button class="nav-tab" data-tab="设置">
          <span>设置</span>
        </button>
      </div>
      <div class="window-controls">
        <img src="image/icon0.png" class="ctrl-icon ctrl-minimize" alt="最小化" title="最小化">
        <img src="image/icon.png" class="ctrl-icon ctrl-close" alt="关闭" title="关闭">
        <div class="ctrl-maximize" title="最大化">
          <div class="maximize-box"></div>
        </div>
      </div>
    </header>

    <!-- ====== Tab: 首页 ====== -->
    <main class="tab-content tab-home" id="tab-首页">
      <div class="top-row">

        <!-- Left: Current Companion -->
        <section class="panel companion-panel" data-linked="伙伴">
          <div class="panel-inner">
            <div class="companion-image">
              <img src="image/96aca45c5b535465c484c4e93df784dc713bea9a.png" alt="杂鱼酱">
            </div>
            <span class="companion-label">当前伙伴</span>
            <span class="companion-name" id="companion-name">杂鱼酱</span>
            <div class="suggestion-box">
              <span class="suggestion-text" id="companion-suggestion">建议：</span>
            </div>
          </div>
        </section>

        <!-- Right: Screen Permissions -->
        <section class="panel permissions-panel" data-linked="设置">
          <div class="panel-inner">
            <div class="permissions-header">
              <h2 class="permissions-title">屏幕获取权限</h2>
              <button class="btn-add-permission" id="btn-add-permission" title="添加权限">
                <img src="image/icon1.png" alt="+">
              </button>
            </div>
            <ul class="permission-list" id="permission-list">
              <!-- Rendered by JS -->
            </ul>
          </div>
        </section>

      </div>

      <!-- Bottom: Recent Games -->
      <section class="panel games-panel" data-linked="首页">
        <h2 class="games-title">最近游戏</h2>
        <div class="games-scroll" id="games-scroll">
          <!-- Rendered by JS -->
        </div>
      </section>
    </main>

    <!-- ====== Tab: 伙伴 (from Frame351 reference) ====== -->
    <main class="tab-content tab-companion hidden" id="tab-伙伴">
      <!-- Large character illustration -->
      <div class="companion-hero">
        <img src="image/73ce001741a5a7a69daa8baf12d4e11ff3640af2.png" alt="杂鱼酱 全身">
      </div>

      <!-- Right sidebar panel -->
      <div class="companion-sidebar">
        <!-- Sub-tabs -->
        <div class="companion-subtabs">
          <button class="companion-subtab active" data-subtab="模型">
            <span>模型</span>
          </button>
          <button class="companion-subtab" data-subtab="工坊">
            <span>工坊</span>
          </button>
        </div>

        <!-- Sub-tab: 模型 — gallery image -->
        <div class="companion-gallery subtab-panel" id="subtab-模型">
          <img src="image/f46582d42aaf93295e8387079342d08a30c48ae4.png" alt="模型展示">
          <div class="gallery-label">ver 1.0</div>
        </div>

        <!-- Sub-tab: 工坊 — custom model upload (Frame 6_42) -->
        <div class="companion-workshop subtab-panel hidden" id="subtab-工坊">
          <div class="workshop-upload-area">
            <div class="workshop-upload-circle">
              <img src="image/Oval.png" alt="" class="workshop-oval">
              <img src="image/eadd.png" alt="添加" class="workshop-plus">
            </div>
          </div>
          <p class="workshop-hint">点击选择或者拖入自制模型和配置文件</p>
        </div>

        <!-- Bottom decorations -->
        <div class="companion-deco deco-left"></div>
        <div class="companion-deco deco-top"></div>
      </div>
    </main>

    <!-- ====== Tab: 游戏 (from html-ai陪玩 (3) reference) ====== -->
    <main class="tab-content tab-games hidden" id="tab-游戏">
      <div class="game-grid-scroll">
        <div class="game-grid" id="game-grid">
          <!-- Rendered by JS -->
        </div>
      </div>
    </main>

    <!-- ====== Tab: 设置 ====== -->
    <main class="tab-content tab-settings hidden" id="tab-设置">
      <div class="tab-placeholder">
        <div class="placeholder-icon">⚙️</div>
        <h2>设置</h2>
        <p>即将开放 — 在这里配置伙伴行为和通用偏好</p>
      </div>
    </main>
  </div>

  <!-- ====== Toast Container ====== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ====== Modal Overlay ====== -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <!-- Confirm Delete -->
    <div class="modal hidden" id="modal-confirm-delete">
      <div class="modal-header">
        <h3>确认删除</h3>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <p>确定要移除此屏幕获取权限吗？</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" data-close>取消</button>
        <button class="btn btn-danger" id="btn-confirm-delete">删除</button>
      </div>
    </div>

    <!-- Add Permission -->
    <div class="modal hidden" id="modal-add-permission">
      <div class="modal-header">
        <h3>添加屏幕获取权限</h3>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="select-app">应用</label>
          <select id="select-app">
            <option value="bilibili">Bilibili</option>
            <option value="steam">Steam</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="input-window">窗口名称</label>
          <input type="text" id="input-window" placeholder="例如: bilibili（应用窗口）">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" data-close>取消</button>
        <button class="btn btn-primary" id="btn-confirm-add">添加</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
